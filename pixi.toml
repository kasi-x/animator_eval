[workspace]
authors = ["kashi-x <kashimiya.exe@gmail.com>"]
channels = ["conda-forge"]
name = "animetor_eval"
platforms = ["linux-64"]
version = "0.1.0"

# ============================================================================
# Tasks (run in default environment unless -e specified)
# ============================================================================
[tasks]
# Core pipeline
pipeline = "python -m src.pipeline"
pipeline-viz = "python -m src.pipeline --visualize"
pipeline-inc = "python -m src.pipeline --incremental"
pipeline-resume = "python -m src.pipeline --resume"
pipeline-llm = { cmd = "python -m src.pipeline", env = { ANIMETOR_LLM = "1" } }

# Development tools — 4-tier test strategy
# --dist loadscope: keeps class tests on one worker → class-scoped fixtures run once, not N×
test = "pytest tests/ -n auto --dist loadscope"     # T4: full suite parallel (all 2161 tests)
test-full = "pytest tests/ -v"                      # T4 (verbose, serial): flaky debug用
test-scoped = "pytest -n auto --dist loadscope"     # T3: `pixi run test-scoped tests/test_foo.py -k "bar"`
test-quick = "pytest -x --lf -n auto --dist loadscope"  # T2: 前回失敗のみ + 即停止 (iteration)
test-impact = "pytest --testmon -n0"                # T1: 変更影響のみ (testmon, xdist併用不可)
test-impact-reset = "rm -f .testmondata"            # testmon cache リセット (スキーマ変更時に実行)
lint = "ruff check src/ tests/"
format = "ruff format src/ tests/"

# Database schema management
schema-inspect = "atlas schema inspect sqlite://./data/animetor.db --format hcl"
schema-diff = "atlas schema diff --env dev"
schema-lint = "atlas schema lint --env dev"

# Benchmarks
bench = "python benchmarks/bench_pipeline.py"
bench-duckdb = "python benchmarks/bench_duckdb.py"
bench-duckdb-synth = "python benchmarks/bench_duckdb.py --synth --repeat 5"

# Reports & Explorer
reports = "PYTHONNOUSERSITE=1 python scripts/generate_all_reports.py"
reports-new = "PYTHONNOUSERSITE=1 python -m src.reporting.cli"
build-explorer = "cd cmd/explorer && go build -o ../../bin/explorer ."
explorer = "bin/explorer -data ./result/json -static ./static/explorer -port 3000"

# Scrapers
scrape-allcinema = "python -m src.scrapers.allcinema_scraper run"
scrape-allcinema-cinema = "python -m src.scrapers.allcinema_scraper cinema"
scrape-allcinema-persons = "python -m src.scrapers.allcinema_scraper persons"
scrape-keyframe = "python -m src.scrapers.keyframe_scraper"

# Utilities
synthetic = "python -m src.synthetic"
build-rust = "maturin develop --release --manifest-path rust_ext/Cargo.toml --uv"
serve = "python -m src.api"
lab = "jupyter lab --notebook-dir=result/notebooks"

# ============================================================================
# Shared Dependencies (included in ALL environments)
# ============================================================================
[dependencies]
python = "3.12.*"
pydantic = ">=2.0"
structlog = "*"
rich = "*"
typer = "*"
httpx = "*"
pyarrow = ">=23.0.1,<24"

# ============================================================================
# Feature: scrape — web scraping and data collection
# ============================================================================
[feature.scrape.dependencies]
beautifulsoup4 = "*"
lxml = "*"

[feature.scrape.pypi-dependencies]
sparqlwrapper = "*"
python-dotenv = ">=1.0"

# ============================================================================
# Feature: analysis — graph analysis, scoring, visualization
# ============================================================================
[feature.analysis.dependencies]
networkx = "*"
pandas = "*"
numpy = ">=1.26,<2.3"
duckdb = ">=1.1"
numba = ">=0.60"
matplotlib = "*"
plotly = ">=6.5.2,<7"
scipy = "*"
scikit-learn = ">=1.0,<1.7"
shap = ">=0.44,<0.49"

[feature.analysis.pypi-dependencies]
openskill = "*"
rapidfuzz = ">=3.0"
lifelines = ">=0.30"
econml = ">=0.16.0"

# ============================================================================
# Feature: api — FastAPI web server
# ============================================================================
[feature.api.pypi-dependencies]
fastapi = ">=0.100"
uvicorn = {version = ">=0.20", extras = ["standard"]}
slowapi = ">=0.1.9"
sqlmodel = ">=0.0.14"

# ============================================================================
# Feature: db — Database schema management (SQLModel + Atlas)
# ============================================================================
[feature.db.pypi-dependencies]
sqlalchemy = ">=2.0"
atlas-provider-sqlalchemy = ">=0.1"

# ============================================================================
# Feature: dev — testing, linting, notebooks
# ============================================================================
[feature.dev.dependencies]
jupyterlab = "*"

[feature.dev.pypi-dependencies]
ruff = ">=0.1"
pytest = ">=7.0"
pytest-cov = ">=4.0"
pytest-xdist = ">=3.5"
pytest-testmon = ">=2.1"

# ============================================================================
# Feature: rust — Rust extension (PyO3/maturin)
# ============================================================================
[feature.rust.dependencies]
rust = ">=1.75"
maturin = ">=1.11.5,<2"

# ============================================================================
# Feature: viz — Julia/CairoMakie visualization (SVG output)
# ============================================================================
[feature.viz.dependencies]
julia = ">=1.10"

[feature.viz.pypi-dependencies]
juliacall = ">=0.9"

[feature.viz.tasks]
setup-julia = "python scripts/setup_julia_env.py"

# ============================================================================
# Feature: neo4j — Neo4j graph database export (optional)
# ============================================================================
[feature.neo4j.pypi-dependencies]
neo4j = ">=5.0"

# ============================================================================
# Environments
# ============================================================================
[environments]
# default: everything (development, testing, CI)
default = ["scrape", "analysis", "api", "dev", "rust", "neo4j", "db"]
# scrape: minimal env for running scrapers only
scrape = ["scrape"]
# analysis: pipeline + scoring (no scrapers, no API server)
analysis = ["analysis"]
# serve: API server with analysis backend
serve = ["analysis", "api", "db"]
# viz: analysis + Julia/CairoMakie SVG generation
viz = ["analysis", "viz"]
