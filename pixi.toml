[workspace]
authors = ["kashi-x <kashimiya.exe@gmail.com>"]
channels = ["conda-forge"]
name = "animetor_eval"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
# Core pipeline
pipeline = "python -m src.pipeline"
pipeline-viz = "python -m src.pipeline --visualize"

# Development tools
test = "pytest tests/ -v"
lint = "ruff check src/ tests/"
format = "ruff format src/ tests/"

# Utilities
synthetic = "python -m src.synthetic"
build-rust = "maturin develop --release --manifest-path rust_ext/Cargo.toml --uv"
serve = "python -m src.api"
lab = "jupyter lab --notebook-dir=result/notebooks"

[dependencies]
python = "3.12.*"
networkx = "*"
pandas = "*"
numpy = "*"
httpx = "*"
beautifulsoup4 = "*"
lxml = "*"
jupyterlab = "*"
matplotlib = "*"
pydantic = ">=2.0"
rich = "*"
structlog = "*"
typer = "*"
plotly = ">=6.5.2,<7"
rust = ">=1.75"
maturin = ">=1.11.5,<2"

[pypi-dependencies]
sparqlwrapper = "*"
openskill = "*"
ruff = ">=0.1"
pytest = ">=7.0"
pytest-cov = ">=4.0"
fastapi = ">=0.100"
uvicorn = {version = ">=0.20", extras = ["standard"]}
rapidfuzz = ">=3.0"
neo4j = ">=5.0"
python-dotenv = ">=1.0"
slowapi = ">=0.1.9"
