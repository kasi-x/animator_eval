# pre-commit hooks for animetor_eval v2 gate automation.
#
# All hooks run via `pixi run python ...` so they see the same
# environment as the rest of the toolchain.
#
# No `--no-verify` escape hatch is configured — if a hook fails,
# fix the underlying issue rather than skipping.

repos:
  - repo: local
    hooks:
      - id: report-vocabulary-lint
        name: Report vocabulary lint (v2 forbidden vocabulary)
        entry: pixi run python scripts/report_generators/lint_vocab.py
        language: system
        # Only runs when someone touches a report generator source file.
        files: ^scripts/report_generators/reports/.*\.py$
        pass_filenames: true

      - id: report-structure-lint
        name: Report structure lint (v2 required sections)
        entry: pixi run python scripts/report_generators/lint_structure.py --source scripts/report_generators/reports
        language: system
        files: ^scripts/report_generators/reports/.*\.py$
        pass_filenames: false

      - id: ci-check-lineage
        name: Lineage leak check (no bronze in public audiences)
        entry: pixi run python scripts/report_generators/ci_check_lineage.py
        language: system
        # Runs only when schema, lineage config, or report generators change.
        files: ^(src/database\.py|src/reporting/|scripts/report_generators/|schema/).*
        pass_filenames: false

      - id: data-dictionary-up-to-date
        name: docs/DATA_DICTIONARY.md regenerated
        entry: pixi run python scripts/export_data_dictionary.py --check
        language: system
        files: ^(src/database\.py|scripts/export_data_dictionary\.py|docs/DATA_DICTIONARY\.md)$
        pass_filenames: false

      - id: quality-snapshot-drift
        name: meta_quality_snapshot anomaly check
        entry: pixi run python scripts/monitoring/check_quality_anomaly.py
        language: system
        # Runs on pipeline / scraper changes. CI also runs it after pipeline runs.
        files: ^(src/pipeline|src/scrapers|src/database\.py).*
        pass_filenames: false
