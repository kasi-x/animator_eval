name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.41.4
          cache: true

      - name: Build Rust extension
        run: pixi run build-rust

      - name: Lint
        run: pixi run lint

      - name: Test
        run: pixi run test

      - name: Run benchmarks
        run: pixi run bench
