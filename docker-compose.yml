# Docker Compose configuration for Animetor Eval services
# Usage:
#   docker compose up -d           # API + Neo4j
#   docker compose up app          # API only
#   docker compose run app python -m src.pipeline  # Run pipeline

services:
  # Animetor Eval Application (API + Pipeline)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: animetor_app
    ports:
      - "8000:8000"
    environment:
      - ANIMETOR_LANG=${ANIMETOR_LANG:-ja}
      - API_SECRET_KEY=${API_SECRET_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:*}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=animetor_dev
    volumes:
      # Persistent data and results
      - ./data:/app/data
      - ./result:/app/result
    depends_on:
      neo4j:
        condition: service_healthy
        required: false
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 2G

  # Neo4j Graph Database (optional)
  neo4j:
    image: neo4j:5.15-community
    container_name: animetor_neo4j
    ports:
      - "7474:7474"  # HTTP (Browser UI)
      - "7687:7687"  # Bolt (Python driver)
    environment:
      NEO4J_AUTH: neo4j/animetor_dev
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_memory_pagecache_size: 2G
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_heap_initial__size: 512M
      NEO4J_dbms_default__database: neo4j
      NEO4J_dbms_directories_import: /var/lib/neo4j/import
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./result/neo4j:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p animetor_dev 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local

networks:
  default:
    name: animetor_network
