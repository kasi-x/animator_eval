version: '3'

tasks:
  default:
    cmds:
      - task --list

  # Data collection
  scrape:
    desc: Scrape AniList (default 50 anime)
    cmds:
      - pixi run python -m src.scrapers.anilist_scraper --count {{.COUNT | default "50"}}

  scrape-old:
    desc: Scrape AniList in old-first order
    cmds:
      - pixi run python -m src.scrapers.anilist_scraper --count {{.COUNT | default "50"}} --reverse

  scrape-update:
    desc: Update AniList cache (airing/new only)
    cmds:
      - pixi run python -m src.scrapers.anilist_scraper --update

  scrape-update-old:
    desc: Update AniList cache in old-first order
    cmds:
      - pixi run python -m src.scrapers.anilist_scraper --update --reverse

  scrape-all:
    desc: Scrape all AniList anime (20400+, auto-resumes from checkpoint)
    cmds:
      - pixi run python -m src.scrapers.anilist_scraper --count 20400

  scrape-all-old:
    desc: Scrape all AniList anime in old-first order (auto-resumes)
    cmds:
      - pixi run python -m src.scrapers.anilist_scraper --count 20400 --reverse

  scrape-restart:
    desc: Restart scrape from beginning (ignore checkpoint)
    cmds:
      - pixi run python -m src.scrapers.anilist_scraper --count {{.COUNT | default "20400"}} --force-restart

  fetch-persons:
    desc: Fetch missing person details from DB credits
    cmds:
      - pixi run python -m src.scrapers.anilist_scraper fetch-persons

  download-images:
    desc: Process pending image download queue
    cmds:
      - pixi run python -m src.scrapers.anilist_scraper process-downloads

  retry-failed:
    desc: Retry failed anime from logs (auto-detect)
    cmds:
      - PYTHONPATH=. pixi run python scripts/retry_failed_anime.py

  retry-failed-ids:
    desc: Retry specific anime IDs (e.g., IDS="179970 186737 192378")
    cmds:
      - PYTHONPATH=. pixi run python scripts/retry_failed_anime.py {{.IDS}}

  extract-failed:
    desc: Extract failed anime IDs from log file
    cmds:
      - bash scripts/extract_failed_ids.sh {{.LOG | default "scraper.log"}}

  fix-status:
    desc: Show DB health status (missing data detection)
    cmds:
      - PYTHONPATH=. pixi run python scripts/fix_scraping_failures_impl.py status

  fix-all:
    desc: Fix all scraping failures (retry + backfill + cleanup)
    cmds:
      - bash scripts/fix_scraping_failures.sh all

  fix-retry:
    desc: "Step 1: Show missing credits breakdown (no AniList staff data)"
    cmds:
      - bash scripts/fix_scraping_failures.sh retry

  fix-backfill:
    desc: "Step 2: Backfill studios/characters/relations + metadata"
    cmds:
      - bash scripts/fix_scraping_failures.sh backfill

  fix-cleanup:
    desc: "Step 3: Detect deleted (404) anime on AniList"
    cmds:
      - bash scripts/fix_scraping_failures.sh cleanup

  # MAL scraping
  scrape-mal:
    desc: Scrape MAL
    cmds:
      - pixi run python -m src.scrapers.mal_scraper --count {{.COUNT | default "50"}}

  # Media Arts scraping
  scrape-mediaarts:
    desc: Fetch Media Arts DB dump from GitHub Releases
    cmds:
      - pixi run python -m src.scrapers.mediaarts_scraper --max-records {{.RECORDS | default "10000"}} --data-dir data/madb

  scrape-jvmg:
    desc: Fetch JVMG data
    cmds:
      - pixi run python -m src.scrapers.jvmg_fetcher

  # Pipeline
  pipeline:
    desc: Run full pipeline
    cmds:
      - pixi run pipeline

  pipeline-viz:
    desc: Run pipeline with visualizations
    cmds:
      - pixi run pipeline-viz

  pipeline-debug:
    desc: Dry-run pipeline (no changes)
    cmds:
      - pixi run python -m src.pipeline --dry-run

  pipeline-profile:
    desc: Run pipeline with performance profiling
    cmds:
      - pixi run python -m src.pipeline --profile

  # Testing
  test:
    desc: Run all tests
    cmds:
      - pixi run test

  test-fast:
    desc: Run tests with fast fail (first failure stops)
    cmds:
      - pixi run pytest tests/ -x --tb=short

  test-cov:
    desc: Run tests with coverage report
    cmds:
      - pixi run pytest tests/ -v --cov=src --cov-report=term-missing

  # Code quality
  lint:
    desc: Lint code
    cmds:
      - pixi run lint

  format:
    desc: Format code
    cmds:
      - pixi run format

  lint-fix:
    desc: Lint and auto-fix issues
    cmds:
      - pixi run ruff check --fix src/ tests/

  # CLI shortcuts
  stats:
    desc: Show stats
    cmds:
      - pixi run python -c 'from src.cli import app; app()' stats --lang {{.LANG | default "en"}}

  ranking:
    desc: Show ranking
    cmds:
      - pixi run python -c 'from src.cli import app; app()' ranking --limit {{.LIMIT | default "50"}}

  export:
    desc: Export data
    cmds:
      - pixi run python -c 'from src.cli import app; app()' export --format {{.FORMAT | default "json"}}

  # Utilities
  serve:
    desc: Start API server
    cmds:
      - pixi run serve

  lab:
    desc: Start Jupyter Lab
    cmds:
      - pixi run lab

  synthetic:
    desc: Generate synthetic test data
    cmds:
      - pixi run synthetic

  build-rust:
    desc: Build Rust extensions
    cmds:
      - pixi run build-rust

  # Data Analysis & Reporting
  graphs:
    desc: Generate all static graphs (matplotlib)
    cmds:
      - echo "📊 Generating static graphs..."
      - mkdir -p result/graphs
      - pixi run python scripts/generate_graphs.py

  graphs-interactive:
    desc: Generate interactive graphs (Plotly HTML)
    cmds:
      - echo "📈 Generating interactive graphs..."
      - mkdir -p result/graphs
      - pixi run python scripts/generate_interactive_graphs.py

  report-credit-stats:
    desc: Generate credit statistics HTML report
    cmds:
      - mkdir -p result/reports
      - pixi run python -c "from src.analysis.credit_stats_html import generate_credit_stats_html; generate_credit_stats_html()"

  report-full:
    desc: Generate comprehensive HTML report (all analyses)
    cmds:
      - mkdir -p result/reports
      - task graphs
      - task graphs-interactive
      - task report-credit-stats
      - echo "✅ Full report generated in result/reports/"

  analyze-bridges:
    desc: Run bridge analysis (key network positions)
    cmds:
      - pixi run python -c "from src.analysis.bridges import analyze_bridges; from src.database import get_connection, load_all_credits, load_all_anime; import json; from pathlib import Path; conn = get_connection(); credits = load_all_credits(conn); anime = load_all_anime(conn); conn.close(); result = analyze_bridges(credits, anime); Path('result/json/bridges.json').write_text(json.dumps(result, indent=2, ensure_ascii=False))"

  analyze-mentorship:
    desc: Run mentorship analysis (mentor-mentee relationships)
    cmds:
      - pixi run python -c "from src.analysis.mentorship import analyze_mentorship; from src.database import get_connection, load_all_credits, load_all_anime; import json; from pathlib import Path; conn = get_connection(); credits = load_all_credits(conn); anime = load_all_anime(conn); conn.close(); result = analyze_mentorship(credits, anime); Path('result/json/mentorships.json').write_text(json.dumps(result, indent=2, ensure_ascii=False))"

  analyze-genre:
    desc: Run genre specialization analysis
    cmds:
      - pixi run python -c "from src.analysis.genre_affinity import analyze_genre_affinity; from src.database import get_connection, load_all_credits, load_all_anime; import json; from pathlib import Path; conn = get_connection(); credits = load_all_credits(conn); anime = load_all_anime(conn); conn.close(); result = analyze_genre_affinity(credits, anime); Path('result/json/genre_affinity.json').write_text(json.dumps(result, indent=2, ensure_ascii=False))"

  analyze-productivity:
    desc: Run productivity analysis
    cmds:
      - pixi run python -c "from src.analysis.productivity import analyze_productivity; from src.database import get_connection, load_all_credits, load_all_anime; import json; from pathlib import Path; conn = get_connection(); credits = load_all_credits(conn); anime = load_all_anime(conn); conn.close(); result = analyze_productivity(credits, anime); Path('result/json/productivity.json').write_text(json.dumps(result, indent=2, ensure_ascii=False))"

  # ============================================================================
  # v2 Gate Automation (Phase 4)
  # ============================================================================
  lint-vocab:
    desc: Lint reports for forbidden vocabulary (能力 / ability / evaluative framing)
    cmds:
      - pixi run python scripts/report_generators/lint_vocab.py {{.CLI_ARGS | default "scripts/report_generators/reports/ result/reports/"}}

  lint-structure:
    desc: Enforce v2 report section structure (概要/Findings/Method Note/Interpretation/Data Statement/Disclaimers)
    cmds:
      - pixi run python scripts/report_generators/lint_structure.py {{.CLI_ARGS | default "scripts/report_generators/reports/"}}

  ci-check-lineage:
    desc: Feature lineage check — meta_* tables with anime.score leak or unlabeled audience
    cmds:
      - pixi run python scripts/report_generators/ci_check_lineage.py

  gates:
    desc: Run all v2 gates (vocab + structure + lineage)
    cmds:
      - task lint-vocab
      - task lint-structure
      - task ci-check-lineage

  data-dictionary:
    desc: Regenerate docs/DATA_DICTIONARY.md from schema + meta_lineage
    cmds:
      - pixi run python scripts/export_data_dictionary.py
      - echo "✅ docs/DATA_DICTIONARY.md regenerated"

  data-dictionary-check:
    desc: Verify docs/DATA_DICTIONARY.md is up-to-date (CI gate)
    cmds:
      - pixi run python scripts/export_data_dictionary.py
      - git diff --exit-code docs/DATA_DICTIONARY.md

  quality-snapshot:
    desc: Compute meta_quality_snapshot (row counts, null rates, distinct cardinality)
    cmds:
      - pixi run python scripts/monitoring/compute_quality_snapshot.py

  quality-check:
    desc: Check for 3σ anomalies vs prior snapshot
    cmds:
      - pixi run python scripts/monitoring/check_quality_anomaly.py

  # ============================================================================
  # Schema Migration
  # ============================================================================
  migrate:
    desc: Apply pending DB migrations (idempotent)
    cmds:
      - pixi run python -c "from src.database import init_db, get_connection; conn = get_connection(); init_db(conn); conn.close()"

  migrate-status:
    desc: Show current schema version
    cmds:
      - pixi run python -c "from src.database import get_connection; c = get_connection().execute('PRAGMA user_version'); print('schema_version =', c.fetchone()[0])"

  # ============================================================================
  # v2 Reports (audience-driven)
  # ============================================================================
  reports-v2:
    desc: Generate v2 audience briefs (policy / hr / biz + technical appendix)
    cmds:
      - mkdir -p result/reports
      - PYTHONNOUSERSITE=1 pixi run python scripts/generate_reports_v2.py

  reports-v2-dry:
    desc: List reports that would be generated without writing output
    cmds:
      - PYTHONNOUSERSITE=1 pixi run python scripts/generate_reports_v2.py --dry-run

  reports-v2-audience:
    desc: 'Generate single audience brief (AUDIENCE=policy|hr|biz|technical_appendix)'
    cmds:
      - PYTHONNOUSERSITE=1 pixi run python scripts/generate_reports_v2.py --audience {{.AUDIENCE}}

  # ============================================================================
  # ETL (Bronze → Silver medallion)
  # ============================================================================
  etl:
    desc: Run bronze → silver ETL integration
    cmds:
      - pixi run python -m src.etl.integrate

  etl-seed:
    desc: Seed synthetic medallion data (bronze + ETL) for testing
    cmds:
      - pixi run python scripts/maintenance/seed_medallion.py

  # ============================================================================
  # Pre-commit / CI full sweep
  # ============================================================================
  ci:
    desc: 'Run full CI locally: lint + test + gates + data-dictionary check'
    cmds:
      - task lint
      - task test
      - task gates
      - task data-dictionary-check

  # Cleanup tasks
  clean-graphs:
    desc: Delete generated graphs
    cmds:
      - rm -rf result/graphs
      - echo "🗑️  Graphs deleted"

  clean-reports:
    desc: Delete generated reports
    cmds:
      - rm -rf result/reports
      - echo "🗑️  Reports deleted"

  clean-json:
    desc: Delete JSON output files
    prompt: Really delete all JSON outputs?
    cmds:
      - rm -rf result/json/*
      - echo "🗑️  JSON outputs deleted"

  clean-db:
    desc: Delete database (complete reset)
    prompt: Really delete database? This cannot be undone.
    cmds:
      - rm -f result/db/animetor_eval.db
      - rm -f data/anilist_checkpoint.json
      - echo "🗑️  Database and checkpoint deleted"

  clean-all:
    desc: Delete all generated files (graphs, reports, JSON)
    prompt: Really delete all generated files?
    cmds:
      - rm -rf result/graphs result/reports result/json/*
      - echo "🗑️  All generated files deleted"

  # Common workflows
  refresh:
    desc: "Refresh analysis: pipeline → graphs → reports"
    cmds:
      - task pipeline-viz
      - task graphs-interactive
      - task report-full
      - echo "✅ Full refresh complete"

  quick-stats:
    desc: Quick stats overview (DB stats + ranking)
    cmds:
      - task stats
      - echo ""
      - task ranking
