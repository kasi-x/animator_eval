version: '3'

tasks:
  default:
    cmds:
      - task --list

  # ==========================================================================
  # Scraping — AniList
  # ==========================================================================
  # ORDER=normal (default) or reverse (old-first)
  scrape:
    desc: 'Scrape AniList (COUNT=50, ORDER=normal|reverse)'
    vars:
      ORDER_FLAG: '{{if eq .ORDER "reverse"}}--reverse{{end}}'
    cmds:
      - pixi run python -m src.scrapers.anilist_scraper --count {{.COUNT | default "50"}} {{.ORDER_FLAG}}

  scrape-update:
    desc: 'Update AniList cache, airing/new only (ORDER=normal|reverse)'
    vars:
      ORDER_FLAG: '{{if eq .ORDER "reverse"}}--reverse{{end}}'
    cmds:
      - pixi run python -m src.scrapers.anilist_scraper --update {{.ORDER_FLAG}}

  scrape-all:
    desc: 'Scrape all AniList anime 20400+ (ORDER=normal|reverse, auto-resumes)'
    vars:
      ORDER_FLAG: '{{if eq .ORDER "reverse"}}--reverse{{end}}'
    cmds:
      - pixi run python -m src.scrapers.anilist_scraper --count 20400 {{.ORDER_FLAG}}

  scrape-restart:
    desc: Restart scrape from beginning (ignore checkpoint)
    cmds:
      - pixi run python -m src.scrapers.anilist_scraper --count {{.COUNT | default "20400"}} --force-restart

  fetch-persons:
    desc: Fetch missing person details from DB credits
    cmds:
      - pixi run python -m src.scrapers.anilist_scraper fetch-persons

  download-images:
    desc: Process pending image download queue
    cmds:
      - pixi run python -m src.scrapers.anilist_scraper process-downloads

  # ==========================================================================
  # Scraping — other sources
  # ==========================================================================
  scrape-mal:
    desc: Scrape MAL
    cmds:
      - pixi run python -m src.scrapers.mal_scraper --count {{.COUNT | default "50"}}

  scrape-mediaarts:
    desc: Fetch Media Arts DB dump from GitHub Releases
    cmds:
      - pixi run python -m src.scrapers.mediaarts_scraper --max-records {{.RECORDS | default "10000"}} --data-dir data/madb

  scrape-jvmg:
    desc: Fetch JVMG data
    cmds:
      - pixi run python -m src.scrapers.jvmg_fetcher

  # ==========================================================================
  # Scraping failures — maintenance
  # ==========================================================================
  # STEP=status|retry|backfill|cleanup|all (default: status)
  fix:
    desc: 'Fix scraping failures (STEP=status|retry|backfill|cleanup|all)'
    cmds:
      - |
        STEP="{{.STEP | default "status"}}"
        if [ "$STEP" = "status" ]; then
          PYTHONPATH=. pixi run python scripts/maintenance/fix_scraping_failures_impl.py status
        else
          bash scripts/maintenance/fix_scraping_failures.sh "$STEP"
        fi

  retry-failed:
    desc: Retry failed anime from logs (IDS="id1 id2" for specific, otherwise auto-detect)
    cmds:
      - PYTHONPATH=. pixi run python scripts/maintenance/retry_failed_anime.py {{.IDS}}

  extract-failed:
    desc: Extract failed anime IDs from log file (LOG=scraper.log)
    cmds:
      - bash scripts/maintenance/extract_failed_ids.sh {{.LOG | default "scraper.log"}}

  # ==========================================================================
  # Pipeline
  # ==========================================================================
  # MODE=default|viz|debug|profile
  pipeline:
    desc: 'Run pipeline (MODE=default|viz|debug|profile)'
    cmds:
      - |
        MODE="{{.MODE | default "default"}}"
        case "$MODE" in
          viz)     pixi run pipeline-viz ;;
          debug)   pixi run python -m src.pipeline --dry-run ;;
          profile) pixi run python -m src.pipeline --profile ;;
          *)       pixi run pipeline ;;
        esac

  # ==========================================================================
  # Testing & code quality
  # ==========================================================================
  test:
    desc: 'Run tests (MODE=default|fast|cov)'
    cmds:
      - |
        MODE="{{.MODE | default "default"}}"
        case "$MODE" in
          fast) pixi run pytest tests/ -x --tb=short ;;
          cov)  pixi run pytest tests/ -v --cov=src --cov-report=term-missing ;;
          *)    pixi run test ;;
        esac

  lint:
    desc: 'Lint code (FIX=1 to auto-fix)'
    cmds:
      - |
        if [ "{{.FIX | default ""}}" = "1" ]; then
          pixi run ruff check --fix src/ tests/
        else
          pixi run lint
        fi

  # format / serve / lab / synthetic / build-rust: use `pixi run <task>` directly
  # (pass-through wrappers removed — see pixi.toml [tasks] for canonical definitions)

  # ==========================================================================
  # CLI shortcuts
  # ==========================================================================
  stats:
    desc: Show stats
    cmds:
      - pixi run python -c 'from src.cli import app; app()' stats --lang {{.LANG | default "en"}}

  ranking:
    desc: Show ranking
    cmds:
      - pixi run python -c 'from src.cli import app; app()' ranking --limit {{.LIMIT | default "50"}}

  export:
    desc: Export data
    cmds:
      - pixi run python -c 'from src.cli import app; app()' export --format {{.FORMAT | default "json"}}

  # ==========================================================================
  # Graphs & reports
  # ==========================================================================
  graphs:
    desc: 'Generate graphs (MODE=static|interactive)'
    cmds:
      - mkdir -p result/graphs
      - |
        MODE="{{.MODE | default "static"}}"
        if [ "$MODE" = "interactive" ]; then
          pixi run python scripts/generate_interactive_graphs.py
        else
          pixi run python scripts/generate_graphs.py
        fi

  report-credit-stats:
    desc: Generate credit statistics HTML report
    cmds:
      - mkdir -p result/reports
      - pixi run python -c "from src.analysis.credit_stats_html import generate_credit_stats_html; generate_credit_stats_html()"

  report-full:
    desc: Generate comprehensive HTML report (all analyses)
    cmds:
      - mkdir -p result/reports
      - task graphs
      - task graphs MODE=interactive
      - task report-credit-stats

  # Report briefs (v2 audience-driven)
  report-briefs:
    desc: Generate all report briefs (policy, HR, business)
    cmds:
      - pixi run python scripts/generate_briefs_v2.py

  report-validate:
    desc: Validate existing report briefs (gates + vocabulary)
    cmds:
      - pixi run python scripts/generate_briefs_v2.py --validate-only

  appendix-generate:
    desc: Generate technical appendix (cross-references to briefs)
    cmds:
      - pixi run python scripts/generate_technical_appendix.py

  appendix-validate:
    desc: Validate technical appendix structure + cross-references
    cmds:
      - pixi run python scripts/generate_technical_appendix.py --validate-only

  report-diff:
    desc: Show before/after diffs for reports (compared to git HEAD)
    cmds:
      - pixi run python scripts/report_diff.py

  report-export:
    desc: 'Export all briefs (FORMAT=html|pdf)'
    cmds:
      - pixi run python scripts/generate_exports.py --format {{.FORMAT | default "html"}}

  # v2 audience reports
  reports-v2:
    desc: 'Generate v2 briefs (AUDIENCE=all|policy|hr|biz|technical_appendix, DRY=1 to preview)'
    cmds:
      - mkdir -p result/reports
      - |
        AUDIENCE="{{.AUDIENCE | default "all"}}"
        DRY="{{.DRY | default ""}}"
        ARGS=""
        [ "$DRY" = "1" ] && ARGS="$ARGS --dry-run"
        [ "$AUDIENCE" != "all" ] && ARGS="$ARGS --audience $AUDIENCE"
        PYTHONNOUSERSITE=1 pixi run python scripts/generate_reports_v2.py $ARGS

  report-versions:
    desc: Show version history of all briefs
    cmds:
      - |
        pixi run python -c '
        import sys
        from pathlib import Path
        sys.path.insert(0, str(Path.cwd()))
        from scripts.report_generators.versioning import get_report_git_history
        for brief_id in ["policy", "hr", "business"]:
            history = get_report_git_history(brief_id, max_versions=10)
            print(f"\n{brief_id.upper()} Brief Versions:")
            print(f"  Total: {history.total_versions}")
            if history.current_version:
                print(f"  Latest: {history.current_version.version_sha} ({history.current_version.timestamp})")
                print(f"         by {history.current_version.author}")
        '

  # Report API endpoints (briefs, versioning, appendix) are now served by the
  # main FastAPI app — run `pixi run serve` to start on port 8000.

  # ==========================================================================
  # v2 Gate Automation
  # ==========================================================================
  lint-vocab:
    desc: Lint reports for forbidden vocabulary
    cmds:
      - pixi run python scripts/report_generators/lint_vocab.py {{.CLI_ARGS | default "scripts/report_generators/reports/ result/reports/"}}

  lint-structure:
    desc: Enforce v2 report section structure
    cmds:
      - pixi run python scripts/report_generators/lint_structure.py {{.CLI_ARGS | default "scripts/report_generators/reports/"}}

  ci-check-lineage:
    desc: Feature lineage check (bronze leaks + lineage quality)
    cmds:
      - pixi run python scripts/report_generators/ci_check_lineage.py

  ci-check-method-notes:
    desc: Validate Method Notes are backed by meta_lineage rows
    cmds:
      - pixi run python scripts/report_generators/ci_check_method_notes.py

  gates:
    desc: Run all v2 gates (vocab + structure + lineage + method notes)
    cmds:
      - task lint-vocab
      - task lint-structure
      - task ci-check-lineage
      - task ci-check-method-notes

  data-dictionary:
    desc: 'Regenerate docs/DATA_DICTIONARY.md (CHECK=1 to verify up-to-date)'
    cmds:
      - pixi run python scripts/export_data_dictionary.py
      - |
        if [ "{{.CHECK | default ""}}" = "1" ]; then
          git diff --exit-code docs/DATA_DICTIONARY.md
        fi

  quality-snapshot:
    desc: Compute meta_quality_snapshot
    cmds:
      - pixi run python scripts/monitoring/compute_quality_snapshot.py

  quality-check:
    desc: Check for 3σ anomalies vs prior snapshot
    cmds:
      - pixi run python scripts/ci_check_quality_drift.py

  # ==========================================================================
  # Schema migration
  # ==========================================================================
  migrate:
    desc: 'Apply migrations (STATUS=1 to show current version)'
    cmds:
      - |
        if [ "{{.STATUS | default ""}}" = "1" ]; then
          pixi run python -c "from src.database import get_connection; c = get_connection().execute('PRAGMA user_version'); print('schema_version =', c.fetchone()[0])"
        else
          pixi run python -c "from src.database import init_db, get_connection; conn = get_connection(); init_db(conn); conn.close()"
        fi

  # ==========================================================================
  # ETL (Bronze → Silver)
  # ==========================================================================
  etl:
    desc: Run bronze → silver ETL integration
    cmds:
      - pixi run python -m src.etl.integrate

  etl-seed:
    desc: Seed synthetic medallion data (bronze + ETL) for testing
    cmds:
      - pixi run python scripts/maintenance/seed_medallion.py

  # ==========================================================================
  # LLM data enrichment
  # ==========================================================================
  # MODE=run (default) | dry-run | cached | script-only
  #   run         — infer via LLM + write nationality to DB (requires Ollama)
  #   dry-run     — infer + cache but no DB writes
  #   cached      — apply already-cached LLM results to DB (no Ollama needed)
  #   show        — print the LLM cache and exit
  # LIMIT=N       — max persons to process (default 200)
  enrich-hometown:
    desc: 'LLM: infer nationality from hometown, cache in hometown_tokens.json (MODE=run|dry-run|cached|show, LIMIT=200)'
    vars:
      _MODE: '{{.MODE | default "run"}}'
      _FLAGS: >-
        {{if eq ._MODE "dry-run"}}--dry-run{{end}}
        {{if eq ._MODE "cached"}}--script-only{{end}}
        {{if eq ._MODE "show"}}--show-cached{{end}}
        --limit {{.LIMIT | default "200"}}
    cmds:
      - pixi run python scripts/maintenance/enrich_hometown_nationality.py {{._FLAGS}}

  # ==========================================================================
  # CI & cleanup
  # ==========================================================================
  ci:
    desc: 'Run full CI locally: lint + test + gates + data-dictionary check'
    cmds:
      - task lint
      - task test
      - task gates
      - task data-dictionary CHECK=1

  # WHAT=graphs|reports|json|db|all
  clean:
    desc: 'Delete generated files (WHAT=graphs|reports|json|db|all)'
    prompt: Really delete?
    cmds:
      - |
        WHAT="{{.WHAT | default "graphs"}}"
        case "$WHAT" in
          graphs)  rm -rf result/graphs ;;
          reports) rm -rf result/reports ;;
          json)    rm -rf result/json/* ;;
          db)      rm -f result/db/animetor_eval.db data/anilist_checkpoint.json ;;
          all)     rm -rf result/graphs result/reports result/json/* ;;
          *)       echo "Unknown WHAT=$WHAT (use graphs|reports|json|db|all)"; exit 1 ;;
        esac

  # ==========================================================================
  # Workflows
  # ==========================================================================
  refresh:
    desc: 'Refresh analysis: pipeline-viz → interactive graphs → report-full'
    cmds:
      - task pipeline MODE=viz
      - task graphs MODE=interactive
      - task report-full

  nightly:
    desc: 'Nightly: regenerate briefs + appendix + validate'
    cmds:
      - task report-briefs
      - task appendix-generate
      - task report-validate
      - task appendix-validate
      - task report-diff

  quick-stats:
    desc: Quick stats overview (DB stats + ranking)
    cmds:
      - task stats
      - task ranking
