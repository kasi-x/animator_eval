# forbidden_vocab_exceptions.yaml
#
# Documented exceptions to the vocabulary enforcement rules.
# Each entry must state WHY the term is permitted in the specific context.
#
# Format:
#   - file: relative path from repo root
#     line_pattern: a substring that uniquely identifies the line
#     term: the prohibited term
#     reason: why this usage is permitted

exceptions:
  - file: docs/REPORT_DESIGN_v3.md
    line_pattern: "「育成力」は能力評価"
    term: 能力
    reason: >
      Meta-discussion: this row in the rename table explains *why* the legacy
      title 「育成力ランキング」 violates the ability-framing rule and must be
      renamed. Discussing the prohibited framing is required to document the
      rename rationale.

  - file: docs/REPORT_DESIGN_v3.md
    line_pattern: "「離職」「能力」「実績」は禁止語"
    term: 能力
    reason: >
      Meta-discussion: lists the prohibited terms that the v3 glossary
      replaces. Naming the prohibited terms is required to specify what the
      glossary blocks.

  - file: scripts/report_generators/_spec.py
    line_pattern: 能力低下
    term: 能力
    reason: >
      Appears inside the _AUDIENCE_DEFAULT_FORBIDDEN dictionary as a
      blocklist literal. Naming the prohibited term is required for the
      InterpretationGuard to filter it out of interpretation text.

  - file: scripts/report_generators/_spec.py
    line_pattern: 能力 / 実績 / 過小評価
    term: 能力
    reason: >
      Appears in a docstring example showing what audience-default
      forbidden_framing values look like. Negation/blocklist context.

  - file: scripts/report_generators/_spec.py
    line_pattern: 能力不足
    term: 能力
    reason: Appears in the hr-audience blocklist literal.

  - file: scripts/report_generators/_spec.py
    line_pattern: 実力ランキング
    term: 実力
    reason: Appears in the hr-audience blocklist literal.

  - file: scripts/report_generators/_spec.py
    line_pattern: 優秀人材
    term: 優秀
    reason: Appears in the hr-audience blocklist literal.

  - file: scripts/report_generators/_spec.py
    line_pattern: 隠れた才能
    term: 才能
    reason: Appears in the biz-audience blocklist literal.

  - file: scripts/report_generators/reports/biz_exposure_gap.py
    line_pattern: 隠れた才能
    term: 才能
    reason: >
      Curated SPEC declares forbidden_framing list including 「隠れた才能」.
      Naming the prohibited phrase in the blocklist is required for the
      InterpretationGuard to filter it out of interpretation text.

  - file: scripts/report_generators/reports/mgmt_director_mentor.py
    line_pattern: 優秀な指導者
    term: 優秀
    reason: >
      Curated SPEC declares forbidden_framing list including 「優秀な指導者」.
      Naming the prohibited phrase in the blocklist is required for the
      InterpretationGuard to filter it out of interpretation text.

  - file: scripts/report_generators/reports/growth_scores.py
    line_pattern: 個人の能力指標ではない
    term: 能力
    reason: >
      Negation context: SPEC limitation explicitly stating that IV score
      is NOT an individual ability indicator. Naming what the metric is
      not is required for the limitation disclosure.

  # docs/GLOSSARY_v3.md は禁止語 → 代替語マッピング表を含む。
  # 禁止語を表のセルに書かないと glossary 機能を果たさない。
  - file: docs/GLOSSARY_v3.md
    line_pattern: "能力 framing → 構造的記述"
    term: 能力
    reason: Glossary heading naming the prohibited framing category.

  - file: docs/GLOSSARY_v3.md
    line_pattern: "一流 / top-tier"
    term: 一流
    reason: Glossary mapping table — forbidden term → suggested replacement.

  - file: docs/GLOSSARY_v3.md
    line_pattern: "のせいで / due to"
    term: のせいで
    reason: Glossary mapping table — forbidden causal phrase → replacement.

