  # ----------------------------------------------------------------------
  # ranking_framing exceptions (added 2026-05-06)
  # ----------------------------------------------------------------------
  # `ranking_framing` bans serial ordering of *individuals*. When the
  # ordered objects are non-persons (genres, features, clusters), the
  # ranking is not a labor-first violation.
  # ----------------------------------------------------------------------

  - file: scripts/report_generators/reports/cooccurrence_groups.py
    line_pattern: name_clusters_by_rank
    term: ranking
    reason: >
      Refers to a clustering algorithm naming convention (relative cluster
      centroid ranking), not to ordering of individual persons. The function
      name `name_clusters_by_rank` describes how K-Means cluster *labels* are
      assigned, not how persons are evaluated.

  - file: scripts/report_generators/reports/biz_genre_whitespace.py
    line_pattern: ジャンル空白地スコア（W_g）ランキング
    term: ランキング
    reason: >
      Ranks *genres* by whitespace score (W_g), not individuals. Genre
      ordering does not violate labor-first stance.

  - file: scripts/report_generators/reports/compensation_fairness.py
    line_pattern: 偏りのないランキング
    term: ランキング
    reason: >
      Refers to the null hypothesis distribution of `person_fe_pct`
      (uniform under H0), explaining what the diagnostic plot tests.
      Used to *check* fairness of the percentile rank, not to recommend it.

  - file: scripts/report_generators/reports/compensation_fairness.py
    line_pattern: ランキングがグループに依存しない
    term: ランキング
    reason: >
      Statistical statement of null hypothesis for the equity test. Names
      what is being tested, not endorsing ranking as an outcome metric.

  - file: scripts/report_generators/reports/mgmt_attrition_risk.py
    line_pattern: MDI）によるランキング
    term: ランキング
    reason: >
      Ranks *features* by importance (RSF MDI), not individuals. Feature
      importance ordering does not violate labor-first stance.


  - file: scripts/report_generators/_spec.py
    line_pattern: 実力ランキング
    term: ランキング
    reason: >
      Appears in the hr-audience blocklist literal (forbidden_framing list),
      naming a prohibited phrase so InterpretationGuard can filter it.
      Same as the existing `term: 実力` exception for the same line.

