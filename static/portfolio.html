<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIMETOR</title>
    <style>
        /* === Reset === */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        /* === Design System Variables === */
        :root {
            --bg-primary: #141414;
            --bg-card: #1c1c1e;
            --bg-elevated: #2a2a2e;
            --bg-input: rgba(255,255,255,0.07);
            --text-primary: #e5e5e5;
            --text-bright: #ffffff;
            --text-secondary: #999;
            --text-muted: #666;
            --accent: #E50914;
            --accent-hover: #F40612;
            --score-pink: #f093fb;
            --score-coral: #f5576c;
            --success: #46D369;
            --info: #0071EB;
            --border: rgba(255,255,255,0.08);
            --radius: 8px;
            --nav-height: 56px;
        }

        /* === Base === */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.5;
            font-size: 15px;
        }
        a { color: inherit; text-decoration: none; }
        button { font-family: inherit; }

        /* === Focus / Accessibility === */
        *:focus-visible {
            outline: 2px solid var(--text-bright);
            outline-offset: 2px;
        }

        /* === Navigation === */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            height: var(--nav-height);
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            transition: background 300ms ease;
        }
        nav.scrolled {
            background: rgba(20, 20, 20, 0.95);
        }
        .nav-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 48px;
            height: 100%;
            display: flex;
            align-items: center;
            gap: 32px;
        }
        .nav-logo {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--accent);
            text-decoration: none;
            flex-shrink: 0;
        }
        .nav-links {
            display: flex;
            gap: 4px;
        }
        .nav-link {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 4px;
            transition: color 200ms ease;
            cursor: pointer;
        }
        .nav-link:hover { color: var(--text-primary); }
        .nav-link.active { color: var(--text-bright); }
        .nav-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .lang-pill {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: color 200ms ease;
        }
        .lang-pill:hover { color: var(--text-secondary); }
        .lang-pill.active { color: var(--text-bright); }
        .lang-sep { color: var(--text-muted); font-size: 13px; user-select: none; }

        /* === Page Transitions === */
        .page { display: none; }
        .page.active {
            display: block;
            animation: pageIn 300ms ease forwards;
        }
        @keyframes pageIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* === Hero Section === */
        .hero {
            text-align: center;
            padding: 100px 24px 64px;
            position: relative;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 300px;
            background: radial-gradient(ellipse at 50% 0%, rgba(229,9,20,0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        .hero-title {
            font-size: 42px;
            font-weight: 800;
            color: var(--text-bright);
            letter-spacing: -0.02em;
            margin-bottom: 12px;
            position: relative;
        }
        .hero-subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 40px;
            position: relative;
        }
        .hero-search-wrap {
            max-width: 560px;
            margin: 0 auto;
            position: relative;
        }
        .hero-search {
            display: block;
            width: 100%;
            padding: 14px 20px 14px 48px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 28px;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            transition: border-color 200ms ease, background 200ms ease;
        }
        .hero-search:focus {
            border-color: rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
        }
        .hero-search::placeholder { color: var(--text-muted); }
        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: var(--text-muted);
            pointer-events: none;
        }

        /* === Category Rows === */
        .category-section {
            padding: 0 48px;
            margin-bottom: 40px;
        }
        .row-header {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }
        .row-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-bright);
            flex: 1;
        }
        .row-arrows {
            display: flex;
            gap: 8px;
        }
        .row-arrow {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.04);
            color: var(--text-primary);
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 200ms ease, border-color 200ms ease;
            line-height: 1;
        }
        .row-arrow:hover {
            background: var(--bg-elevated);
            border-color: rgba(255,255,255,0.15);
        }
        .row-track-wrap {
            position: relative;
        }
        .row-track-wrap::before,
        .row-track-wrap::after {
            content: '';
            position: absolute;
            top: 0; bottom: 8px;
            width: 48px;
            z-index: 2;
            pointer-events: none;
        }
        .row-track-wrap::before {
            left: 0;
            background: linear-gradient(90deg, var(--bg-primary) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 200ms;
        }
        .row-track-wrap.has-scroll-left::before { opacity: 1; }
        .row-track-wrap::after {
            right: 0;
            background: linear-gradient(270deg, var(--bg-primary) 0%, transparent 100%);
        }
        .row-track {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding-bottom: 8px;
            scroll-behavior: smooth;
        }
        .row-track::-webkit-scrollbar { display: none; }

        /* === Person Cards — Small (Row) === */
        .person-card-sm {
            min-width: 200px;
            max-width: 200px;
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 16px;
            cursor: pointer;
            scroll-snap-align: start;
            transition: transform 250ms ease, box-shadow 250ms ease, background 250ms ease;
            border: 1px solid transparent;
            flex-shrink: 0;
        }
        .person-card-sm:hover {
            transform: scale(1.05);
            background: var(--bg-elevated);
            border-color: var(--border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        /* === Person Cards — Large (Search Grid) === */
        .person-card-lg {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px;
            cursor: pointer;
            transition: transform 250ms ease, box-shadow 250ms ease, background 250ms ease;
            border: 1px solid transparent;
        }
        .person-card-lg:hover {
            transform: translateY(-3px);
            background: var(--bg-elevated);
            border-color: var(--border);
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
        }

        /* === Card Content === */
        .card-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-bright);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        .card-name-lg {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-bright);
            margin-bottom: 2px;
        }
        .card-name-sub {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .card-role {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .card-scores {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .card-score-pill {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .pill-iv { background: rgba(240,147,251,0.15); color: var(--score-pink); }
        .pill-birank { background: rgba(102,126,234,0.15); color: #667eea; }
        .pill-patronage { background: rgba(70,211,105,0.15); color: var(--success); }
        .pill-person-fe { background: rgba(245,87,108,0.15); color: var(--score-coral); }
        .card-similarity {
            font-size: 11px;
            color: var(--success);
            margin-top: 6px;
            font-weight: 500;
        }

        /* === Search Results Page === */
        .search-page-header {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 48px 24px;
        }
        .search-page-input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: border-color 200ms ease;
            position: relative;
        }
        .search-page-input:focus { border-color: rgba(255,255,255,0.2); }
        .search-page-input::placeholder { color: var(--text-muted); }
        .search-input-wrap {
            position: relative;
        }
        .search-input-wrap .search-icon {
            left: 14px;
        }
        .search-results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 48px 48px;
        }
        .search-count {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 48px 16px;
            font-size: 13px;
            color: var(--text-muted);
        }

        /* === Profile Page === */
        .profile-hero {
            max-width: 1200px;
            margin: 0 auto;
            padding: 48px 48px 0;
            position: relative;
        }
        .profile-hero::before {
            content: '';
            position: absolute;
            top: -56px; left: 0; right: 0;
            height: 280px;
            background: radial-gradient(ellipse at 50% 0%, rgba(240,147,251,0.06) 0%, transparent 70%);
            pointer-events: none;
        }
        .profile-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 24px;
            cursor: pointer;
            transition: color 200ms ease;
        }
        .profile-back:hover { color: var(--text-primary); }
        .profile-name {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-bright);
            letter-spacing: -0.02em;
            position: relative;
        }
        .profile-name-en {
            font-size: 16px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .profile-badges {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .badge-pill {
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
            background: rgba(255,255,255,0.06);
            color: var(--text-secondary);
        }
        .badge-pill.role {
            background: rgba(229,9,20,0.12);
            color: #ff6b6b;
        }
        .badge-pill.id {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 11px;
        }

        /* === Score Cards === */
        .score-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-top: 32px;
        }
        .score-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
            border: 1px solid transparent;
            transition: border-color 200ms ease;
        }
        .score-card:hover {
            border-color: var(--border);
        }
        .score-card.highlight {
            background: linear-gradient(135deg, rgba(240,147,251,0.06), rgba(245,87,108,0.04));
            border-color: rgba(240,147,251,0.12);
        }
        .score-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-bright);
            letter-spacing: -0.02em;
        }
        .score-card.highlight .score-value {
            background: linear-gradient(135deg, var(--score-pink), var(--score-coral));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .score-label {
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-top: 6px;
        }

        /* === Profile Sections === */
        .profile-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 48px 0;
        }
        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-bright);
            margin-bottom: 16px;
        }

        /* === Score Bars === */
        .score-bars {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .bar-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .bar-label {
            width: 90px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            text-align: right;
            flex-shrink: 0;
        }
        .bar-track {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.06);
            border-radius: 3px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 3px;
            width: 0;
            transition: width 800ms cubic-bezier(0.4, 0, 0.2, 1);
        }
        .bar-birank { background: linear-gradient(90deg, #667eea, #764ba2); }
        .bar-patronage { background: linear-gradient(90deg, #46D369, #2d9b3a); }
        .bar-person-fe { background: linear-gradient(90deg, #f5576c, #ff8c42); }
        .bar-iv-score { background: linear-gradient(90deg, #f093fb, #f5576c); }
        .bar-value {
            width: 55px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            flex-shrink: 0;
        }

        /* === Individual Contribution Cards === */
        .contrib-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }
        .contrib-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 20px;
            border: 1px solid transparent;
            transition: border-color 200ms ease;
        }
        .contrib-card:hover { border-color: var(--border); }
        .contrib-name {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }
        .contrib-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-bright);
        }
        .contrib-desc {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
            line-height: 1.6;
        }

        /* === Chart Containers === */
        .chart-container {
            background: rgba(0,0,0,0.2);
            border-radius: var(--radius);
            padding: 16px;
        }
        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        /* === Ranking Page === */
        .ranking-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 48px 48px;
        }
        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-bright);
            letter-spacing: -0.02em;
            margin-bottom: 24px;
        }
        .filter-bar {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-group {
            display: flex;
            gap: 4px;
        }
        .filter-pill {
            padding: 7px 18px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 200ms ease;
        }
        .filter-pill:hover {
            border-color: rgba(255,255,255,0.2);
            color: var(--text-primary);
        }
        .filter-pill.active {
            background: var(--text-bright);
            color: var(--bg-primary);
            border-color: var(--text-bright);
        }

        /* === Ranking Table === */
        .rank-table {
            width: 100%;
            border-collapse: collapse;
        }
        .rank-table th {
            text-align: left;
            padding: 12px 16px;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }
        .rank-table td {
            padding: 12px 16px;
            font-size: 14px;
            color: var(--text-primary);
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .rank-table tbody tr {
            cursor: pointer;
            transition: background 150ms ease;
        }
        .rank-table tbody tr:hover {
            background: var(--bg-elevated);
        }
        .rank-table td.rank-num {
            color: var(--accent);
            font-weight: 700;
            width: 50px;
        }
        .rank-table .person-name {
            font-weight: 500;
            color: var(--text-bright);
        }
        .rank-table .person-name:hover {
            text-decoration: underline;
        }
        .rank-table td.score-col {
            font-variant-numeric: tabular-nums;
        }

        /* === Disclaimer === */
        .disclaimer {
            background: var(--bg-card);
            border-left: 3px solid var(--text-muted);
            padding: 16px 20px;
            border-radius: 0 var(--radius) var(--radius) 0;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-top: 32px;
        }
        .disclaimer strong {
            color: var(--text-primary);
        }

        /* === Loading Skeletons === */
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        .skeleton {
            background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-elevated) 50%, var(--bg-card) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s ease infinite;
            border-radius: var(--radius);
        }
        .skeleton-card {
            min-width: 200px;
            max-width: 200px;
            height: 100px;
            flex-shrink: 0;
            scroll-snap-align: start;
        }
        .skeleton-card-lg {
            height: 130px;
        }
        .skeleton-score {
            height: 90px;
        }
        .skeleton-bar {
            height: 6px;
            border-radius: 3px;
        }
        .skeleton-text {
            height: 16px;
            border-radius: 4px;
        }
        .skeleton-text.w60 { width: 60%; }
        .skeleton-text.w40 { width: 40%; }
        .skeleton-text.w80 { width: 80%; }
        .skeleton-row-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* === Report Mini Cards (Home Row) === */
        .report-card-sm {
            min-width: 260px;
            max-width: 260px;
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 16px 18px;
            cursor: pointer;
            scroll-snap-align: start;
            transition: transform 250ms ease, box-shadow 250ms ease, border-color 250ms ease;
            border: 1px solid transparent;
            flex-shrink: 0;
            text-decoration: none;
            display: block;
            color: inherit;
        }
        .report-card-sm:hover {
            transform: scale(1.04);
            border-color: rgba(240,147,251,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .report-card-sm .report-num {
            font-size: 10px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.1em;
            margin-bottom: 6px;
        }
        .report-card-sm h4 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-bright);
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .report-card-sm .report-subtitle {
            font-size: 12px;
            color: var(--score-pink);
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .report-card-sm .report-desc {
            font-size: 11px;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .row-title-link {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-bright);
            flex: 1;
            text-decoration: none;
            transition: color 200ms ease;
            cursor: pointer;
        }
        .row-title-link:hover { color: var(--score-pink); }
        .row-title-link::after {
            content: ' \203A';
            color: var(--text-muted);
            font-weight: 400;
        }

        /* === Reports Page === */
        .reports-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 48px 48px;
        }
        .reports-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
        }
        .report-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 24px;
            border: 1px solid transparent;
            transition: transform 250ms ease, box-shadow 250ms ease, border-color 250ms ease;
            cursor: pointer;
            text-decoration: none;
            display: block;
            color: inherit;
        }
        .report-card:hover {
            transform: translateY(-3px);
            border-color: rgba(240,147,251,0.2);
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
        }
        .report-num {
            font-size: 11px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }
        .report-card h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-bright);
            margin-bottom: 4px;
        }
        .report-subtitle {
            font-size: 13px;
            color: var(--score-pink);
            margin-bottom: 8px;
        }
        .report-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 12px;
        }
        .report-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .report-sources {
            font-size: 11px;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }
        .report-badge {
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(70,211,105,0.15);
            color: var(--success);
            flex-shrink: 0;
        }

        /* === Empty State === */
        .empty-state {
            text-align: center;
            padding: 80px 24px;
        }
        .empty-state-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .empty-state-text {
            font-size: 15px;
            color: var(--text-secondary);
        }

        /* === Responsive === */
        @media (max-width: 1024px) {
            .score-cards { grid-template-columns: repeat(2, 1fr); }
            .profile-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            .nav-inner { padding: 0 16px; gap: 16px; }
            .hero { padding: 72px 16px 40px; }

            .score-value { font-size: 24px; }
            .profile-hero { padding: 24px 16px 0; }

            .search-results-grid { padding: 0 16px 32px; grid-template-columns: 1fr; }
            .search-count { padding: 0 16px 12px; }
            .ranking-container { padding: 24px 16px 32px; }
            .reports-container { padding: 24px 16px 32px; }
            .reports-grid { grid-template-columns: 1fr; }
            .page-title { font-size: 24px; }
            .filter-bar { gap: 12px; }

            .rank-table th,

        }
