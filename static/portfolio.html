<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animetor Eval — Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #667eea;
            --primary-dark: #5a67d8;
            --accent: #764ba2;
            --bg: #f7f8fc;
            --card: #ffffff;
            --text: #2d3748;
            --text-muted: #718096;
            --border: #e2e8f0;
            --success: #48bb78;
            --warning: #ed8936;
            --danger: #f56565;
            --radius: 12px;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        nav {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            padding: 0 24px;
            display: flex;
            align-items: center;
            height: 60px;
            box-shadow: 0 2px 12px rgba(102,126,234,0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav .logo { color: white; font-size: 20px; font-weight: 700; margin-right: 32px; }
        nav a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        nav a:hover, nav a.active { color: white; background: rgba(255,255,255,0.15); }
        .nav-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
        .lang-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }
        .lang-btn.active { background: rgba(255,255,255,0.3); }
        .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
        .page { display: none; }
        .page.active { display: block; }
        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
            margin-bottom: 20px;
        }
        .card h2 { font-size: 18px; margin-bottom: 16px; color: var(--primary-dark); }
        .search-hero { text-align: center; padding: 80px 0 40px; }
        .search-hero h1 {
            font-size: 36px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .search-hero p { color: var(--text-muted); margin-bottom: 32px; font-size: 16px; }
        .search-box { display: flex; max-width: 600px; margin: 0 auto; }
        .search-box input {
            flex: 1; padding: 14px 20px;
            border: 2px solid var(--border);
            border-radius: var(--radius) 0 0 var(--radius);
            font-size: 16px; outline: none;
        }
        .search-box input:focus { border-color: var(--primary); }
        .search-box button {
            padding: 14px 28px; background: var(--primary); color: white;
            border: none; border-radius: 0 var(--radius) var(--radius) 0;
            font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .search-box button:hover { background: var(--primary-dark); }
        .search-results { max-width: 600px; margin: 24px auto 0; }
        .search-item {
            display: flex; align-items: center; padding: 14px 16px;
            border-bottom: 1px solid var(--border); cursor: pointer;
        }
        .search-item:hover { background: #f0f4ff; }
        .search-item .name { flex: 1; font-weight: 500; }
        .search-item .name small { color: var(--text-muted); font-weight: 400; margin-left: 8px; }
        .search-item .score { font-size: 14px; font-weight: 700; color: var(--primary); }
        .profile-header { display: flex; align-items: flex-start; gap: 24px; flex-wrap: wrap; }
        .profile-header .info { flex: 1; min-width: 200px; }
        .profile-header h1 { font-size: 28px; margin-bottom: 4px; }
        .profile-header .subtitle { color: var(--text-muted); font-size: 15px; margin-bottom: 16px; }
        .id-badge {
            display: inline-block; background: #edf2f7; padding: 3px 10px;
            border-radius: 4px; font-size: 12px; color: var(--text-muted); font-family: monospace;
        }
        .score-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 16px; }
        .score-cell { text-align: center; padding: 16px 8px; border-radius: 10px; background: #f7f8fc; }
        .score-cell .label { font-size: 12px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
        .score-cell .value { font-size: 28px; font-weight: 700; color: var(--primary-dark); }
        .score-cell.iv-score { background: linear-gradient(135deg, #ebf4ff, #e8e0f7); }
        .score-cell.iv-score .value { color: var(--accent); }
        .bar-chart { display: flex; flex-direction: column; gap: 10px; }
        .bar-row { display: flex; align-items: center; gap: 12px; }
        .bar-label { width: 100px; font-size: 13px; font-weight: 500; text-align: right; }
        .bar-track { flex: 1; height: 24px; background: #edf2f7; border-radius: 12px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 12px; transition: width 0.6s ease; }
        .bar-fill.birank { background: linear-gradient(90deg, #667eea, #5a67d8); }
        .bar-fill.patronage { background: linear-gradient(90deg, #48bb78, #38a169); }
        .bar-fill.person-fe { background: linear-gradient(90deg, #ed8936, #dd6b20); }
        .bar-fill.iv-score { background: linear-gradient(90deg, #764ba2, #667eea); }
        .bar-value { width: 50px; font-size: 13px; font-weight: 600; }
        .contrib-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
        .contrib-card { padding: 16px; border-radius: 10px; border: 1px solid var(--border); }
        .contrib-card .metric-name { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
        .contrib-card .metric-value { font-size: 24px; font-weight: 700; }
        .contrib-card .metric-desc { font-size: 12px; color: var(--text-muted); margin-top: 8px; line-height: 1.5; }
        .similar-list { display: flex; flex-direction: column; gap: 8px; }
        .similar-item {
            display: flex; align-items: center; padding: 10px 14px;
            border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
        }
        .similar-item:hover { border-color: var(--primary); background: #f0f4ff; }
        .similar-item .name { flex: 1; font-size: 14px; font-weight: 500; }
        .similar-item .similarity { font-size: 13px; color: var(--success); font-weight: 600; }
        .rank-controls { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .rank-controls select {
            padding: 8px 14px; border: 1px solid var(--border);
            border-radius: 8px; font-size: 14px; background: white;
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left; padding: 10px 12px; border-bottom: 2px solid var(--border);
            font-size: 13px; text-transform: uppercase; color: var(--text-muted); cursor: pointer;
        }
        td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
        tr:hover { background: #f7f8fc; }
        tr td:first-child { font-weight: 700; color: var(--primary); width: 50px; }
        .clickable { cursor: pointer; }
        .clickable:hover .person-name { color: var(--primary); text-decoration: underline; }
        .disclaimer {
            background: #fff5f5; border-left: 4px solid var(--danger);
            padding: 16px; border-radius: 0 8px 8px 0;
            font-size: 13px; line-height: 1.6; color: #742a2a; margin-top: 24px;
        }
        .loading { text-align: center; padding: 40px; color: var(--text-muted); }
        .spinner {
            display: inline-block; width: 32px; height: 32px;
            border: 3px solid var(--border); border-top-color: var(--primary);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            .container { padding: 16px; }
            nav { padding: 0 12px; }
            .search-hero h1 { font-size: 24px; }
            .score-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <nav>
        <span class="logo">Animetor Eval</span>
        <a href="#search" class="nav-link active" data-page="search" data-i18n="nav_search">Search</a>
        <a href="#ranking" class="nav-link" data-page="ranking" data-i18n="nav_ranking">Ranking</a>
        <div class="nav-right">
            <button class="lang-btn" data-lang="en">EN</button>
            <button class="lang-btn active" data-lang="ja">JA</button>
        </div>
    </nav>
    <div class="container">
        <div id="page-search" class="page active">
            <div class="search-hero">
                <h1 data-i18n="search_title">Animetor Eval</h1>
                <p data-i18n="search_subtitle">Search anime industry professionals by name</p>
                <div class="search-box">
                    <input type="text" id="searchInput" data-i18n-placeholder="search_placeholder" placeholder="Enter name..." />
                    <button id="searchBtn" data-i18n="search_button">Search</button>
                </div>
            </div>
            <div id="searchResults" class="search-results"></div>
        </div>
        <div id="page-profile" class="page"><div id="profileContent"></div></div>
        <div id="page-ranking" class="page">
            <div class="card">
                <h2 data-i18n="ranking_title">Ranking</h2>
                <div class="rank-controls">
                    <select id="rankSort">
                        <option value="iv_score">IV Score</option>
                        <option value="birank">BiRank</option>
                        <option value="patronage">Patronage</option>
                        <option value="person_fe">Person FE</option>
                    </select>
                    <select id="rankRole">
                        <option value="" data-i18n="ranking_all_roles">All Roles</option>
                        <option value="director">Director</option>
                        <option value="animator">Animator</option>
                        <option value="designer">Designer</option>
                    </select>
                </div>
                <div id="rankingTable"></div>
            </div>
        </div>
    </div>
    <script src="/static/portfolio.js"></script>
</body>
</html>
